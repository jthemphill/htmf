name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Setup Bazel for BuildBuddy execution
        if: env.IS_FORK_PR != 'true'
        uses: ./.github/actions/setup-bazel
        with:
          mode: buildbuddy
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Setup Bazel for local execution
        if: env.IS_FORK_PR == 'true'
        uses: ./.github/actions/setup-bazel
        with:
          mode: local

      - name: Setup bun
        uses: oven-sh/setup-bun@v2.0.2
        with:
          bun-version: latest

      - name: Setup just
        uses: extractions/setup-just@v3.1.0

      - name: Build webapp
        run: just build_www

      - name: Deploy to GitHub Pages (PR Preview)
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www/dist
          destination_dir: pr-preview/pr-${{ github.event.number }}
          keep_files: true

      - name: Comment PR with preview link
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://${{ github.repository_owner }}.github.io/htmf/pr-preview/pr-${prNumber}/`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('PR Preview')
            );

            const commentBody = `## 🚀 PR Preview

            Your preview is ready! View the changes at:

            **${previewUrl}**

            This preview will be updated automatically when you push new commits to this PR.

            ---
            <sub>Built with commit ${context.sha.substring(0, 7)}</sub>`;

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6.0.2
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          rm -rf pr-preview/pr-${{ github.event.number }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Remove preview for PR #${{ github.event.number }}" || echo "No changes to commit"
          git push origin gh-pages || echo "No changes to push"

      - name: Comment PR about cleanup
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '## 🧹 Preview Cleanup\n\nThe preview for this PR has been removed.',
            });
