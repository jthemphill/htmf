name: WWW build
env:
  CARGO_TERM_COLOR: always
  IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        node-version: [24.x]

    name: Test WWW on ${{matrix.os}}
    runs-on: ${{matrix.os}}

    steps:
      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Library caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            ~/Library/Caches/
          key: ${{ runner.os }}-library-${{ steps.date.outputs.date }}

      - name: Setup Bazel for BuildBuddy execution
        if: env.IS_FORK_PR != 'true'
        uses: ./.github/actions/setup-bazel
        with:
          mode: buildbuddy
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Setup Bazel for local execution
        if: env.IS_FORK_PR == 'true'
        uses: ./.github/actions/setup-bazel
        with:
          mode: local

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Run tests
        run: just test
