name: WWW build
env:
  CARGO_TERM_COLOR: always
  IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        node-version: [24.x]

    name: Test WWW on ${{matrix.os}}
    runs-on: ${{matrix.os}}

    steps:
      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Library caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
            ~/Library/Caches/
          key: ${{ runner.os }}-library-${{ steps.date.outputs.date }}

      - name: Configure BuildBuddy auth
        if: env.IS_FORK_PR != 'true'
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          if [ -z "$BUILDBUDDY_API_KEY" ]; then
            echo "BUILDBUDDY_API_KEY is required for trusted CI runs." >&2
            exit 1
          fi

          echo 'BAZEL_CONFIG=--config=buildbuddy -c opt' >> "$GITHUB_ENV"

      - name: Configure Bazel for local execution
        if: env.IS_FORK_PR == 'true'
        run: echo 'BAZEL_CONFIG=-c opt' >> "$GITHUB_ENV"

      - name: Setup Bazel (Bazel remote execution)
        if: env.IS_FORK_PR != 'true'
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: false
          external-cache: true
          repository-cache: true
          bazelrc: |
            common:buildbuddy --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Setup Bazel (Bazel local execution)
        if: env.IS_FORK_PR == 'true'
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: htmf
          external-cache: true
          repository-cache: true

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Run tests
        run: just test
