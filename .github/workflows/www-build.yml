name: WWW build
env:
  CARGO_TERM_COLOR: always
  IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test WWW
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: |
          version=$(node -p "require('./www/package.json').devDependencies.playwright")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Playwright browser cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Setup Bazel for BuildBuddy execution
        if: env.IS_FORK_PR != 'true'
        uses: ./.github/actions/setup-bazel
        with:
          mode: buildbuddy
          buildbuddy-api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Setup Bazel for local execution
        if: env.IS_FORK_PR == 'true'
        uses: ./.github/actions/setup-bazel
        with:
          mode: local

      - name: Setup bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Setup just
        uses: extractions/setup-just@v4.0.0

      - name: Run tests
        run: just test
